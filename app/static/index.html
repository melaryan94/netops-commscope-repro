<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NetOps Command Center (repro)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    input, button { padding: .5rem; margin: .25rem 0; font-size: 1rem; }
    input[type=text], input[type=password] { width: 100%; box-sizing: border-box; }
    pre { background: #0b1021; color: #d6e2ff; padding: 1rem; border-radius: 8px; overflow: auto; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; }
    .row button { flex: 1; }
    small { color: #666; }
  </style>
</head>
<body>
  <h1>NetOps Command Center — repro SPA</h1>
  <p><small>
    API base is blank = <b>same origin</b> (the fixed, single-origin state behind App Gateway).
    Set it to a different host to reproduce the cross-origin / Private-Network-Access login failure.
  </small></p>

  <label>API base URL (blank = same origin)</label>
  <input id="apiBase" type="text" placeholder="e.g. https://app-xxxx.azurewebsites.net" />

  <label>Username</label>
  <input id="u" type="text" value="netops" />
  <label>Password</label>
  <input id="p" type="password" value="netops-demo" />

  <div class="row">
    <button onclick="login()">Login</button>
    <button onclick="call('/api/v1/devices')">Devices</button>
    <button onclick="call('/api/v1/egress-ip')">Egress IP</button>
    <button onclick="call('/api/v1/dbcheck')">DB check</button>
  </div>

  <pre id="out">Ready.</pre>

  <script>
    let token = "";
    const base = () => document.getElementById('apiBase').value.replace(/\/$/, '');
    const out = (t) => (document.getElementById('out').textContent = t);

    async function login() {
      try {
        const r = await fetch(base() + '/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('u').value,
            password: document.getElementById('p').value,
          }),
        });
        if (!r.ok) return out('Login failed: HTTP ' + r.status);
        const data = await r.json();
        token = data.access_token;
        out('Login OK. Token acquired.\n' + JSON.stringify(data, null, 2));
      } catch (e) {
        out('ERROR (this is the CORS / Private-Network-Access failure):\n' + e);
      }
    }

    async function call(path) {
      if (!token) return out('Login first.');
      try {
        const r = await fetch(base() + path, { headers: { Authorization: 'Bearer ' + token } });
        out(path + ' -> HTTP ' + r.status + '\n' + JSON.stringify(await r.json(), null, 2));
      } catch (e) {
        out('ERROR calling ' + path + ':\n' + e);
      }
    }
  </script>
</body>
</html>
