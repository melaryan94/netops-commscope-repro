# Reusable Terraform "stack" pipeline template (private CI/CD).
# Plan on PR, apply on merge to main (gated by an Environment approval).
# All the real logic lives here ONCE; each RG gets a tiny consumer file that
# `extends` this template with its own parameters (see rg-example.yml).

parameters:
  - name: stackPath          # e.g. brownfield-scaffold/stacks/rg-network
    type: string
  - name: environment        # ADO Environment name (approval gate), e.g. rg-network
    type: string
  - name: subscriptionId
    type: string
  - name: serviceConnection
    type: string
    default: 'sc-netops-cicd'
  - name: mdpPool            # Managed DevOps Pool (VNet-injected)
    type: string
    default: 'netops-cicd-pool'
  - name: terraformVersion
    type: string
    default: '1.15.8'

stages:
# ---------- PLAN (PRs + main) ----------
- stage: Plan
  jobs:
  - job: plan
    pool: { name: '${{ parameters.mdpPool }}' }
    steps:
      - bash: |
          set -e
          command -v unzip >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y unzip; }
          command -v az >/dev/null 2>&1 || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        displayName: 'Ensure tooling (unzip + Azure CLI)'
      - task: TerraformInstaller@1
        inputs: { terraformVersion: '${{ parameters.terraformVersion }}' }
      - task: AzureCLI@2
        displayName: 'terraform plan'
        inputs:
          azureSubscription: '${{ parameters.serviceConnection }}'
          scriptType: bash
          addSpnToEnvironment: true
          workingDirectory: '${{ parameters.stackPath }}'
          scriptLocation: inlineScript
          inlineScript: |
            export ARM_USE_OIDC=true
            export ARM_CLIENT_ID=$servicePrincipalId
            export ARM_TENANT_ID=$tenantId
            export ARM_OIDC_TOKEN=$idToken
            export ARM_SUBSCRIPTION_ID=${{ parameters.subscriptionId }}
            terraform init
            terraform validate
            terraform plan -input=false -out=tfplan
      - publish: '${{ parameters.stackPath }}/tfplan'
        artifact: tfplan

# ---------- APPLY (main only, gated by Environment approval) ----------
- stage: Apply
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: apply
    environment: '${{ parameters.environment }}'
    pool: { name: '${{ parameters.mdpPool }}' }
    strategy:
      runOnce:
        deploy:
          steps:
            - checkout: self
            - download: current
              artifact: tfplan
            - bash: |
                set -e
                command -v unzip >/dev/null 2>&1 || { sudo apt-get update -y && sudo apt-get install -y unzip; }
                command -v az >/dev/null 2>&1 || curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
              displayName: 'Ensure tooling (unzip + Azure CLI)'
            - task: TerraformInstaller@1
              inputs: { terraformVersion: '${{ parameters.terraformVersion }}' }
            - task: AzureCLI@2
              displayName: 'terraform apply'
              inputs:
                azureSubscription: '${{ parameters.serviceConnection }}'
                scriptType: bash
                addSpnToEnvironment: true
                workingDirectory: '${{ parameters.stackPath }}'
                scriptLocation: inlineScript
                inlineScript: |
                  export ARM_USE_OIDC=true
                  export ARM_CLIENT_ID=$servicePrincipalId
                  export ARM_TENANT_ID=$tenantId
                  export ARM_OIDC_TOKEN=$idToken
                  export ARM_SUBSCRIPTION_ID=${{ parameters.subscriptionId }}
                  terraform init
                  cp $(Pipeline.Workspace)/tfplan/tfplan ./tfplan
                  terraform apply -input=false tfplan
